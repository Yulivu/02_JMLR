suite: current_repro
description: Local reproducibility suite for pre-paper Tensor CRF posterior-event validation.
tasks:
  - id: formal_validation_smoke
    script: scripts/exp1/run_event_training_task.py
    config: experiments/configs/exp1/formal_validation_smoke.yaml
    output_subdir: local_checks/formal_validation_smoke
    tags:
      - exp1
      - controlled
      - smoke
      - machine:cpu
    enabled: true

  - id: semi_real_quick
    script: scripts/exp1/run_event_training_task.py
    config: experiments/configs/exp2/semi_real_quick.yaml
    output_subdir: local_checks/semi_real_quick
    tags:
      - exp2
      - semi-real
      - smoke
      - machine:cpu
    enabled: false

  - id: real_source_quick
    script: scripts/exp1/run_event_training_task.py
    config: experiments/configs/exp3/real_source_quick.yaml
    output_subdir: local_checks/real_source_quick
    tags:
      - exp3
      - real-source
      - smoke
      - machine:cpu
      - needs:data/raw/online_retail.xlsx
    enabled: false
